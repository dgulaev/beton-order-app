name: Database Backup

# Ежедневный бэкап базы Supabase в этот же репозиторий (папка db-backups/).
# Требует секрет SUPABASE_DB_URL (см. инструкцию в db-backups/README.md).

on:
  schedule:
    - cron: '0 2 * * *' # 02:00 UTC = 05:00 (МСК)
  workflow_dispatch: {} # позволяет запустить бэкап вручную из вкладки Actions

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Ubuntu-раннер даёт pg_dump версии 16, а сервер Supabase — 17.x.
      # pg_dump отказывается дампить сервер новее себя ("server version
      # mismatch"), поэтому ставим клиент 17 из официального репозитория
      # PostgreSQL вместо дефолтного из Ubuntu.
      - name: Install PostgreSQL 17 client
        run: |
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc https://www.postgresql.org/media/keys/ACCC4CF8.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update -y
          sudo apt-get install -y postgresql-client-17

      - name: Dump database
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          # set -o pipefail — без этого ошибка pg_dump "проглатывалась" внутри
          # пайпа: gzip всё равно успешно сжимал пустой ввод в валидный
          # (но бесполезный) gzip-файл на 20 байт, и шаг завершался "успешно".
          set -euo pipefail

          if [ -z "$DATABASE_URL" ]; then
            echo "::error::Секрет SUPABASE_DB_URL не задан. Добавьте его в Settings → Secrets and variables → Actions."
            exit 1
          fi

          mkdir -p db-backups
          TIMESTAMP=$(date -u +'%Y-%m-%d')
          FILE="db-backups/backup-${TIMESTAMP}.sql.gz"

          pg_dump "$DATABASE_URL" --no-owner --no-acl --format=plain | gzip > "$FILE"

          SIZE=$(stat -c%s "$FILE")
          echo "Создан файл: $FILE ($SIZE байт)"

          # Вторая страховка: реальный дамп базы весит явно больше 1 КБ даже
          # для пустой БД (одна структура таблиц). Если файл меньше — что-то
          # пошло не так, даже если pg_dump не вернул код ошибки явно.
          if [ "$SIZE" -lt 1024 ]; then
            echo "::error::Дамп подозрительно мал ($SIZE байт) — вероятно pg_dump завершился с ошибкой (неверный пароль или сетевая проблема IPv4/IPv6). Backup не будет закоммичен."
            rm -f "$FILE"
            exit 1
          fi

      - name: Remove backups older than 30 days
        run: find db-backups -name 'backup-*.sql.gz' -mtime +30 -delete

      - name: Commit and push backup
        run: |
          git config user.name "db-backup-bot"
          git config user.email "actions@users.noreply.github.com"
          git add db-backups
          if git diff --cached --quiet; then
            echo "Нет изменений для коммита"
          else
            git commit -m "chore: automated database backup $(date -u +'%Y-%m-%d')"
            git push
          fi
